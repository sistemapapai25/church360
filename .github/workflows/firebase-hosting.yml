name: Deploy Flutter Web to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Build Flutter Web
        run: flutter build web
        working-directory: app

      - name: Install Firebase CLI
       run: npm install -g firebase-tools@13.0.0

      - name: Show Firebase CLI version
        run: firebase --version

      - name: Debug build output
        run: ls -lah app/build/web

      - name: Check Hosting sites access
        env:
            FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
            run: firebase hosting:sites:list --project church360-15887238

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project church360-15887238 --debug
